<html>
    <head>
        <meta charset="UTF-8">
        
        <title>Sigma Doctors Patient Form</title>
        <!-- Load CSS Here -->

    </head>
    <body>
        <div id="header">
            <table width=100%>
                <tr>
                    <td><img id="logo" src="https://damianlaz.w3spaces.com/mis3371/homework1/Med_Logo.jpg" alt="Sigma Doctors Logo"></td>
                    <td valign="bottom" halign="right">Today's Date: <span id="today"></span></td>
                </tr>
            </table>
        </div>
        <hr>
        <div id="body"> Patient Registration Form
<form name="signup" id="signp" onreset="removedata1()" action="homework1-thanks.html">
<table class="form">
    <tr class="form">
        <th class="form" colspan="3"> Set up a new patient account</th>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="firstname">First Name,</label>
            <label for="middleinitial"> Middle Initial,</label>
            <label for="lastname">Last Name:</label>
        </td>
        <td>
            <input type="text"
            size="10"
            maxlength="30"
            id="firstname"
            name="firstname"
            required
            placeholder="First Name (required)"
            title="Enter the patient's first name."
            >
            <input type="text"
            class="textsize1"
            size="2"
            maxlength="1"
            id="middleinitial"
            name="middleinitial"
            placeholder="MI"
            title="Enter the patient's middle initial."
            >
            <input type="text"
            size="20"
            maxlength="30"
            id="lastname"
            name="lastname"
            required
            placeholder="Last Name (required)"
            title="Enter the patient's last name."
            >
        </td>
    </tr class="form">
    <tr class="form">
        <td align="right">
            <label for="dateofbirth">Date of Birth:</label>
        </td>
        <td>
            <input type="date"
            id="dateofbirth"
            name="dateofbirth"
            required
            title="Enter the patient's date of birth."
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="ssn">Social Security Number:</label>
        </td>
        <td>
            <input type="password"
            id="ssn"
            name="ssn"
            inputmode="numeric"
            pattern="[0-9]{3}-?[0-9]{2}-?[0-9]{4}"
            required
            placeholder="XXX-XX-XXXX"
            minlength="9"
            maxlength="11"
            title="Enter the patient's social security number."
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="address1">Address Line 1:</label>
        </td>
        <td>
            <input type="text"
            size="35"
            maxlength="30"
            minlength="5"
            id="address1"
            name="address1"
            required
            placeholder="4455 University Dr (required)"
            title="Enter the patient's address."
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="address2">Address Line 2:</label>
        </td>
        <td>
            <input type="text"
            size="35"
            maxlength="30"
            minlength="5"
            id="address2"
            name="address2"
            placeholder="Apartment #, suite, etc."
            title="Enter the patient's address line 2 (optional)."
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="city">City, </label>
            <label for="state"> State, </label>
            <label for="zip"> Zip Code:</label>
        </td>
        <td>
            <input type="text"
            size="20"
            maxlength="30"
            id="city"
            name="city"
            required
            placeholder="City (required)"
            title="Enter the patient's city."
            >
            <select required name="state">
                <option value=""></option>
                <option value="AL">Alabama</option>
                <option value="AK">Alaska</option>
                <option value="AZ">Arizona</option>
                <option value="AR">Arkansas</option>
                <option value="CA">California</option>
                <option value="CO">Colorado</option>
                <option value="CT">Connecticut</option>
                <option value="DE">Delaware</option>
                <option value="DC">District Of Columbia</option>
                <option value="FL">Florida</option>
                <option value="GA">Georgia</option>
                <option value="HI">Hawaii</option>
                <option value="ID">Idaho</option>
                <option value="IL">Illinois</option>
                <option value="IN">Indiana</option>
                <option value="IA">Iowa</option>
                <option value="KS">Kansas</option>
                <option value="KY">Kentucky</option>
                <option value="LA">Louisiana</option>
                <option value="ME">Maine</option>
                <option value="MD">Maryland</option>
                <option value="MA">Massachusetts</option>
                <option value="MI">Michigan</option>
                <option value="MN">Minnesota</option>
                <option value="MS">Mississippi</option>
                <option value="MO">Missouri</option>
                <option value="MT">Montana</option>
                <option value="NE">Nebraska</option>
                <option value="NV">Nevada</option>
                <option value="NH">New Hampshire</option>
                <option value="NJ">New Jersey</option>
                <option value="NM">New Mexico</option>
                <option value="NY">New York</option>
                <option value="NC">North Carolina</option>
                <option value="ND">North Dakota</option>
                <option value="OH">Ohio</option>
                <option value="OK">Oklahoma</option>
                <option value="OR">Oregon</option>
                <option value="PA">Pennsylvania</option>
                <option value="RI">Rhode Island</option>
                <option value="SC">South Carolina</option>
                <option value="SD">South Dakota</option>
                <option value="TN">Tennessee</option>
                <option value="TX">Texas</option>
                <option value="UT">Utah</option>
                <option value="VT">Vermont</option>
                <option value="VA">Virginia</option>
                <option value="WA">Washington</option>
                <option value="WV">West Virginia</option>
                <option value="WI">Wisconsin</option>
                <option value="WY">Wyoming</option>
            </select>
            <input type="text"
            size="12"
            maxlength="5"
            id="zip"
            name="zip"
            inputmode="numeric" 
            required
            placeholder="Zip (req'd)"
            title="Enter the patient's zip code."
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="phone">Phone Number:</label>
        </td>
        <td>
            <input type="tel"
            id="phone"
            name="phone"
            inputmode="numeric"
            pattern="[0-9]{3}-?[0-9]{3}-?[0-9]{4}"
            required
            placeholder="XXX-XXX-XXXX"
            minlength="10"
            maxlength="12"
            title="Enter the patient's phone number."
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="email">Email Address:</label>
        </td>
        <td>
            <input type="email"
            id="email"
            name="email"
            required
            placeholder="example@domain.com"
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="username">Create Username:</label>
        </td>
        <td>
            <input type="text"
            id="username"
            name="username"
            size="20"
            maxlength="30"
            required
            placeholder="Enter a username"
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="password">Create Password:</label>
        </td>
        <td>
            <input type="password"
            id="password"
            name="password"
            size="20"
            maxlength="30"
            required
            placeholder="Enter a password"
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="confirm_password">Confirm Password:</label>
        </td>
        <td>
            <input type="password"
            id="confirm_password"
            name="confirm_password"
            size="20"
            maxlength="30"
            required
            placeholder="Re-enter password"
            >
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="symptoms">Describe your symptoms and pain levels:</label>
        </td>
        <td>
            <textarea id="symptoms" 
            name="symptoms" 
            rows="3" 
            cols="50" 
            maxlength="500"
            placeholder="Describe your symptoms and pain levels here:" 
            title="Enter a description of the patient's symptoms and pain levels.">
            </textarea>
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="chronic">Do you have any of these chronic conditions?</label>
        </td>
        <td>
            <input type="checkbox" id="diabetes" name="chronic" value="diabetes">
            <label for="diabetes">Diabetes</label><br>
            <input type="checkbox" id="hypertension" name="chronic" value="hypertension">
            <label for="hypertension">Hypertension</label><br>
            <input type="checkbox" id="heartdisease" name="chronic" value="heartdisease">
            <label for="heartdisease">Heart Disease</label><br>
            <input type="checkbox" id="asthma" name="chronic" value="asthma">
            <label for="asthma">Asthma</label><br>
            <input type="checkbox" id="none" name="chronic" value="none">
            <label for="none">None of the above</label><br>
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="gender">Gender:</label>
        </td>
        <td>
            <input type="radio" id="male" name="gender" value="male" required>
            <label for="male">Male</label><br>
            <input type="radio" id="female" name="gender" value="female" required>
            <label for="female">Female</label><br>
            <input type="radio" id="other" name="gender" value="other" required>
            <label for="other">Other</label><br>    
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="insurance">Do you have health insurance?</label>
        </td>
        <td>
            <input type="radio" id="insurance_yes" name="insurance" value="yes" required>
            <label for="insurance_yes">Yes</label><br>
            <input type="radio" id="insurance_no" name="insurance" value="no" required>
            <label for="insurance_no">No</label><br>    
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="student">Are you okay with a student sitting in and watching the session?</label>
        </td>
        <td>
            <input type="radio" id="student_yes" name="student" value="yes" required>
            <label for="student_yes">Yes</label><br>
            <input type="radio" id="student_no" name="student" value="no" required>
            <label for="student_no">No</label><br>    
        </td>
    </tr>
    <tr class="form">
        <td align="right">
            <label for="feeling">How are you feeling today?</label>
        </td>
        <td align="center">
            <input type="range"
            class="slider"
            id="feeling" 
            name="feeling" 
            min="0" 
            max="10" 
            value="5">
            <span id="rangedisplay">5</span>
        </td>
    </tr>
    <tr class="form">
        <td colspan="3" align="center">
            <input type="submit" value="Submit form">
            <input type="reset" value="Reset form">
        </td>
</table>
</form> 
        </div>
        <div id="footer">
            <hr>
            <p>2026 Sigma Doctors. All rights reserved.</p>
            <p>Contact us at sigma_doctorsmd@gmail.com</p>
        </div>
    
    <script>
        // Display today's date in the header
        const d = new Date();
        let text = d.toLocaleDateString();
        document.getElementById("today").innerHTML = text;

        // Update the range display when the slider is moved
        const feelingSlider = document.getElementById('feeling');
        const rangeDisplay = document.getElementById('rangedisplay');
        feelingSlider.addEventListener('input', () => {
            rangeDisplay.textContent = feelingSlider.value;
        });
    </script>
    </body>
</html>
